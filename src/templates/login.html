<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login — SER App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080c14;
            --surface: rgba(0, 0, 0, 0.25);
            --surface-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(99, 179, 237, 0.5);
            --accent: #63b3ed;
            --accent2: #76e4f7;
            --accent-glow: rgba(99, 179, 237, 0.15);
            --text: #e8f0fe;
            --muted: rgba(232, 240, 254, 0.45);
            --danger: #fc8181;
            --success: #68d391;
            --radius: 14px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99, 179, 237, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(118, 228, 247, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(99, 179, 237, 0.03) 0%, transparent 70%);
            z-index: 0;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            animation: float 12s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--accent2);
            bottom: -80px;
            right: -80px;
            animation-delay: -6s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -20px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 15px) scale(0.97);
            }
        }

        /* Grid lines overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99, 179, 237, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 179, 237, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .page-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 24px;
            animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px;
            margin-bottom: 14px;
            box-shadow: 0 0 30px rgba(99, 179, 237, 0.3);
        }

        .brand-icon svg {
            width: 26px;
            height: 26px;
            fill: #080c14;
        }

        .brand h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #e8f0fe 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 4px;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .card {
            background: rgba(255, 255, 255, 0.035);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .card-sub {
            color: var(--muted);
            font-size: 0.84rem;
            margin-bottom: 28px;
            font-weight: 300;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 7px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .field-wrap {
            position: relative;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.35;
            pointer-events: none;
            display: flex;
        }

        .field-icon svg {
            width: 16px;
            height: 16px;
            stroke: var(--text);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        input::placeholder {
            color: var(--muted);
            font-weight: 300;
        }

        input:focus {
            border-color: var(--border-active);
            background: rgba(99, 179, 237, 0.05);
            box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.08);
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            color: #080c14;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(99, 179, 237, 0.3);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(99, 179, 237, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
            margin: 22px 0 0;
            font-weight: 300;
        }

        .divider a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .divider a:hover {
            color: var(--accent2);
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="page-wrap">
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 3c-1.5 0-3 .8-3 2.5C9 7 10 8 10 9.5c0 .8-.5 1.5-1 2l1 1c1-1 2-2 2-3.5 0-2-1-3-1-4.5 0-.8.4-1.5 1-2zm4 0c-1.5 0-3 .8-3 2.5C13 7 14 8 14 9.5c0 .8-.5 1.5-1 2l1 1c1-1 2-2 2-3.5 0-2-1-3-1-4.5 0-.8.4-1.5 1-2zM5 13c0 3.9 3.1 7 7 7s7-3.1 7-7H5zm7 5c-1.7 0-3.3-.7-4.4-1.9h8.8C14.3 17.3 12.7 18 12 18z" />
                </svg>
            </div>
            <h1>SER Platform</h1>
            <p>Speech Emotion Recognition System</p>
        </div>

        <div class="card">
            <div class="card-title">Welcome back</div>
            <div class="card-sub">Sign in to continue to your workspace</div>

            <form method="POST">
                <div class="field">
                    <label>Email</label>
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg viewBox="0 0 24 24">
                                <circle cx="12" cy="8" r="4" />
                                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                            </svg>
                        </span>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="field">
                    <label>Password</label>
                    <div class="field-wrap">
                        <span class="field-icon">
                            <svg viewBox="0 0 24 24">
                                <rect x="3" y="11" width="18" height="11" rx="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </span>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn">Sign In →</button>
            </form>

            <p class="divider">Don't have an account? <a href="/signup">Create one</a></p>
        </div>
    </div>
</body>

</html>
